<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENGSE203 LAB 3</title>
  <!-- <link rel="stylesheet" href="./src/style.css" /> -->
  <script type="module" crossorigin src="./assets/index-BQq4nnHf.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CRWpu_aY.css">
</head>
<body>
  <header class="hero">
    <div class="container">
      <p class="eyebrow">ENGSE203 • LAB 3</p>
      <h1>Campus Service Request</h1>
      <p>Lab 3 • Responsive Web UI + Event + Form </p>
    </div>
  </header>

  <main class="container page-grid">
    <section class="panel" aria-labelledby="form-title">
      <h2 id="form-title">Create Service Request</h2>

      <form id="profile-form" novalidate>
        <!-- TODO 1: Requester Name field -->
        <div class="field">
          <label for="display-name">ชื่อที่ต้องการแสดง</label>
          <input
            id="display-name"
            name="displayName"
            type="text"
            minlength="2"
            placeholder="ชื่อ: รหัสนักศึกษา "
            aria-describedby="displayName-hint displayName-error"
            required />
          <small id="displayName-hint" class="hint">อย่างน้อย 2 ตัวอักษร</small>
          <small id="displayName-error" class="error"></small>
        </div>

        <!-- TODO 2: Request Type select -->
        <div class="field">
          <label for="learning-role">Request Type</label>
          <select id="learning-role" name="learningRole" aria-describedby="learningRole-error" required>
            <option value="">-- สถานที่ --</option>
            <option value="เครือข่าย">เครือข่าย</option>
            <option value="เอกสาร">เอกสาร</option>
            <option value="จองสถานที่">จองสถานที่</option>
            <option value="ซ่อมบำรุง">ซ่อมบำรุง</option>
          </select>
          <small id="learningRole-error" class="error"></small>
        </div>

        <!-- TODO 3: Details textarea -->
        <div class="field">
          <label for="learning-goal">เป้าหมายการเรียนรู้</label>
          <textarea
            id="learning-goal"
            name="learningGoal"
            rows="5"
            minlength="10"
            placeholder="เช่น ต้องการสร้างเว็บที่ใช้งานได้จริงและรองรับมือถือ"
            aria-describedby="learningGoal-hint learningGoal-error"
            required></textarea>
          <div class="field-meta">
            <small id="learningGoal-hint" class="hint">อย่างน้อย 10 ตัวอักษร</small>
            <small id="goal-count" class="counter" aria-live="polite">0 ตัวอักษร</small>
          </div>
          <small id="learningGoal-error" class="error"></small>
        </div>
      
        <button type="submit">Submit Request</button>
        <p id="form-status" class="status" role="status"></p>
      </form>
    </section>

  
    <aside class="panel preview-panel" aria-labelledby="preview-title">
      <h2 id="preview-title" class="step-label">Live Preview</h2>
      
      
      <div class="profile-card">
        <div class="avatar" id="preview-avatar">📝</div>
        <div>
          <p class="profile-card__label">REQUESTER NAME</p>
          <h3 id="preview-name">ยังไม่ระบุชื่อ</h3>
        </div>
        <div>
          <p class="profile-card__label">REQUEST TYPE</p>
          <p class="role" id="preview-type">ยังไม่เลือกประเภท</p>
        </div>
        <div>
          <p class="profile-card__label">DETAILS</p>
          <p class="goal" id="preview-details">ยังไม่มีรายละเอียด</p>
        </div>
      </div>

      <h3 style="margin-top: 1.5rem; font-size: 1.1rem;">Submitted Requests</h3>
      <ul id="request-list" class="request-list" style="padding-left: 1.2rem; margin: 0.5rem 0 0;"></ul>
    </aside>
  </main>
</body>
</html>
